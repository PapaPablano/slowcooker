/* ---- fraction-friendly quantity display ---- */
function qtyText(n) {
  if (n == null) return "";
  const whole = Math.floor(n + 1e-9);
  const frac = n - whole;
  const map = [
    [0.125, "⅛"], [0.25, "¼"], [1 / 3, "⅓"], [0.375, "⅜"],
    [0.5, "½"], [0.625, "⅝"], [2 / 3, "⅔"], [0.75, "¾"], [0.875, "⅞"],
  ];
  let fstr = "";
  for (const [v, s] of map) if (Math.abs(frac - v) < 0.04) { fstr = s; break; }
  if (fstr) return whole ? `${whole}${fstr}` : fstr;
  const rounded = Math.round(n * 100) / 100;
  return String(rounded % 1 === 0 ? rounded : rounded);
}

/* ---- persistence via artifact storage (falls back to memory) ---- */
const STORE_KEY = "familydinner:v1";
function loadState() {
  try {
    const v = localStorage.getItem(STORE_KEY);
    if (v) return JSON.parse(v);
  } catch (e) { /* first run / unavailable */ }
  return null;
}
function saveState(obj) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch (e) {}
}

const uid = () => Math.random().toString(36).slice(2, 9);

function App() {
  const [tab, setTab] = useState("meals");
  const [ratings, setRatings] = useState({});
  const [hidden, setHidden] = useState({});
  const [weeks, setWeeks] = useState([]);
  const [activeWeek, setActiveWeek] = useState(null);
  const [checked, setChecked] = useState({});
  const [shopWeeks, setShopWeeks] = useState({});
  const [hidePantry, setHidePantry] = useState(false);
  const [loaded, setLoaded] = useState(false);

  // load once
  useEffect(() => {
    (async () => {
      const s = await loadState();
      if (s) {
        setRatings(s.ratings || {});
        setHidden(s.hidden || {});
        setWeeks(s.weeks || []);
        setChecked(s.checked || {});
        setShopWeeks(s.shopWeeks || {});
        setHidePantry(!!s.hidePantry);
        setActiveWeek((s.weeks && s.weeks[0] && s.weeks[0].id) || null);
      }
      setLoaded(true);
    })();
  }, []);

  // save on change (after load)
  useEffect(() => {
    if (!loaded) return;
    saveState({ ratings, hidden, weeks, checked, shopWeeks, hidePantry });
  }, [ratings, hidden, weeks, checked, shopWeeks, hidePantry, loaded]);

  const byId = useMemo(() => Object.fromEntries(DATA.map((r) => [r.id, r])), []);

  /* ---------- week helpers ---------- */
  function addWeek(name) {
    const w = { id: uid(), name: name || `Week ${weeks.length + 1}`, items: [] };
    setWeeks((p) => [...p, w]);
    setActiveWeek(w.id);
    setShopWeeks((p) => ({ ...p, [w.id]: true }));
    return w.id;
  }
  function renameWeek(id, name) {
    setWeeks((p) => p.map((w) => (w.id === id ? { ...w, name } : w)));
  }
  function removeWeek(id) {
    setWeeks((p) => p.filter((w) => w.id !== id));
    setShopWeeks((p) => { const n = { ...p }; delete n[id]; return n; });
    if (activeWeek === id) setActiveWeek((weeks.find((w) => w.id !== id) || {}).id || null);
  }
  function addToWeek(weekId, rid) {
    setWeeks((p) =>
      p.map((w) => {
        if (w.id !== weekId) return w;
        if (w.items.some((it) => it.rid === rid)) return w;
        return { ...w, items: [...w.items, { rid, mult: 2 }] };
      })
    );
  }
  function removeFromWeek(weekId, rid) {
    setWeeks((p) => p.map((w) => (w.id === weekId ? { ...w, items: w.items.filter((it) => it.rid !== rid) } : w)));
  }
  function setMult(weekId, rid, mult) {
    setWeeks((p) => p.map((w) => (w.id === weekId ? { ...w, items: w.items.map((it) => (it.rid === rid ? { ...it, mult } : it)) } : w)));
  }

  function rate(rid, val) {
    setRatings((p) => ({ ...p, [rid]: p[rid] === val ? undefined : val }));
  }
  function toggleHide(rid) {
    setHidden((p) => ({ ...p, [rid]: !p[rid] }));
  }

  const weekCount = (rid) => weeks.reduce((n, w) => n + (w.items.some((it) => it.rid === rid) ? 1 : 0), 0);

  return (
    <div className="fd-root">
      <style>{CSS}</style>

      <header className="fd-top">
        <div className="fd-brand">
          <span className="fd-pot" aria-hidden>◗</span>
          <div>
            <div className="fd-word">The Prep Board</div>
            <div className="fd-sub">freezer-to-slow-cooker planning · {DATA.length} meals</div>
          </div>
        </div>
        <nav className="fd-tabs">
          {[
            ["meals", "Meals"],
            ["weeks", "My Weeks"],
            ["cook", "Instructions"],
            ["grocery", "Grocery List"],
          ].map(([k, label]) => (
            <button
              key={k}
              className={"fd-tab" + (tab === k ? " on" : "")}
              onClick={() => setTab(k)}
            >
              {label}
              {k === "weeks" && weeks.length > 0 && <span className="fd-badge">{weeks.length}</span>}
            </button>
          ))}
        </nav>
      </header>

      <main className="fd-main">
        {tab === "meals" && (
          <MealsTab
            data={DATA}
            ratings={ratings}
            hidden={hidden}
            rate={rate}
            toggleHide={toggleHide}
            weeks={weeks}
            addWeek={addWeek}
            addToWeek={addToWeek}
            weekCount={weekCount}
          />
        )}
        {tab === "weeks" && (
          <WeeksTab
            weeks={weeks}
            byId={byId}
            activeWeek={activeWeek}
            setActiveWeek={setActiveWeek}
            addWeek={addWeek}
            renameWeek={renameWeek}
            removeWeek={removeWeek}
            removeFromWeek={removeFromWeek}
            setMult={setMult}
            ratings={ratings}
            goShop={() => setTab("grocery")}
            goMeals={() => setTab("meals")}
          />
        )}
        {tab === "cook" && (
          <InstructionsTab
            weeks={weeks}
            byId={byId}
            activeWeek={activeWeek}
            setActiveWeek={setActiveWeek}
            goMeals={() => setTab("meals")}
          />

        {tab === "grocery" && (
          <GroceryTab
            weeks={weeks}
            byId={byId}
            shopWeeks={shopWeeks}
            setShopWeeks={setShopWeeks}
            checked={checked}
            setChecked={setChecked}
            hidePantry={hidePantry}
            setHidePantry={setHidePantry}
            goMeals={() => setTab("meals")}
          />
        )}
      </main>
    </div>
  );
}

/* ================= MEALS ================= */
function MealsTab({ data, ratings, hidden, rate, toggleHide, weeks, addWeek, addToWeek, weekCount }) {
  const [q, setQ] = useState("");
  const [protein, setProtein] = useState("all");
  const [cuisine, setCuisine] = useState("all");
  const [quick, setQuick] = useState(false);
  const [sort, setSort] = useState("az");
  const [showHidden, setShowHidden] = useState(false);
  const [menuFor, setMenuFor] = useState(null);

  const proteins = ["all", "chicken", "beef", "pork", "turkey", "vegetarian"];
  const cuisines = useMemo(
    () => ["all", ...Array.from(new Set(data.map((r) => r.cuisine).filter(Boolean))).sort()],
    [data]
  );

  const list = useMemo(() => {
    let out = data.filter((r) => {
      if (!showHidden && hidden[r.id]) return false;
      if (protein !== "all" && !r.proteins.includes(protein)) return false;
      if (cuisine !== "all" && r.cuisine !== cuisine) return false;
      if (quick && !(r.cookHours != null && r.cookHours <= 4)) return false;
      if (q.trim()) {
        const hay = (r.name + " " + (r.cuisine || "") + " " + r.ing.map((i) => i.n).join(" ")).toLowerCase();
        if (!hay.includes(q.trim().toLowerCase())) return false;
      }
      return true;
    });
    const rw = { love: 0, ok: 1, undefined: 2, ok2: 2, skip: 3 };
    out.sort((a, b) => {
      if (sort === "az") return a.name.localeCompare(b.name);
      if (sort === "cook") return (a.cookHours || 99) - (b.cookHours || 99);
      if (sort === "rating") {
        const ra = rw[ratings[a.id]] ?? 2, rb = rw[ratings[b.id]] ?? 2;
        return ra - rb || a.name.localeCompare(b.name);
      }
      return 0;
    });
    return out;
  }, [data, q, protein, cuisine, quick, sort, showHidden, hidden, ratings]);

  const hiddenCount = data.filter((r) => hidden[r.id]).length;

  return (
    <div>
      <div className="fd-toolbar">
        <input
          className="fd-search"
          placeholder="Search meals, ingredients, or cuisine (e.g. Italian, chicken, lime)…"
          value={q}
          onChange={(e) => setQ(e.target.value)}
        />
        <div className="fd-chips">
          {proteins.map((p) => (
            <button
              key={p}
              className={"fd-chip" + (protein === p ? " on" : "")}
              style={protein === p && p !== "all" ? { background: PROTEIN_COLOR[p], borderColor: PROTEIN_COLOR[p], color: "#fff" } : null}
              onClick={() => setProtein(p)}
            >
              {p === "all" ? "All proteins" : PROTEIN_LABEL[p]}
            </button>
          ))}
          <button className={"fd-chip" + (quick ? " on" : "")} onClick={() => setQuick((v) => !v)}>
            ⏱ Quick (≤4h)
          </button>
        </div>
        <div className="fd-toolrow">
          <label className="fd-sortlab">
            Cuisine
            <select className="fd-select" value={cuisine} onChange={(e) => setCuisine(e.target.value)}>
              {cuisines.map((c) => (
                <option key={c} value={c}>{c === "all" ? "All cuisines" : c}</option>
              ))}
            </select>
          </label>
          <label className="fd-sortlab">
            Sort
            <select className="fd-select" value={sort} onChange={(e) => setSort(e.target.value)}>
              <option value="az">A–Z</option>
              <option value="cook">Cook time</option>
              <option value="rating">My rating</option>
            </select>
          </label>
          {hiddenCount > 0 && (
            <button className="fd-link" onClick={() => setShowHidden((v) => !v)}>
              {showHidden ? "Hide skipped" : `Show skipped (${hiddenCount})`}
            </button>
          )}
          <span className="fd-count">{list.length} shown</span>
        </div>
      </div>

      {list.length === 0 ? (
        <div className="fd-empty">No meals match those filters. Loosen a filter to see more.</div>
      ) : (
        <div className="fd-grid">
          {list.map((r) => (
            <MealCard
              key={r.id}
              r={r}
              rating={ratings[r.id]}
              isHidden={!!hidden[r.id]}
              rate={rate}
              toggleHide={toggleHide}
              weeks={weeks}
              addWeek={addWeek}
              addToWeek={addToWeek}
              inWeeks={weekCount(r.id)}
              menuOpen={menuFor === r.id}
              setMenu={(v) => setMenuFor(v ? r.id : null)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

              })}
              <div className="fd-menu-new">

                  className="fd-menu-input"

                  onKeyDown={(e) => {
                    if (e.key === "Enter") {
                      const id = addWeek(newName.trim() || undefined);
                      addToWeek(id, r.id);
                      setNewName(""); setMenu(false);
                    }
                  }}
                />
                <button
                  className="fd-menu-add"
                  onClick={() => { const id = addWeek(newName.trim() || undefined); addToWeek(id, r.id); setNewName(""); setMenu(false); }}
                >
                  Create

              </div>
            </div>
          )}
        </div>
        <button className="fd-hide" onClick={() => toggleHide(r.id)}>
          {isHidden ? "Unhide" : "Hide"}
        </button>
      </div>
    </article>
  );
}

/* ================= WEEKS ================= */

          {editing ? (
            <input

/* ================= GROCERY ================= */
function GroceryTab({ weeks, byId, shopWeeks, setShopWeeks, checked, setChecked, hidePantry, setHidePantry, goMeals }) {
  const chosen = weeks.filter((w) => shopWeeks[w.id] && w.items.length > 0);

  const grouped = useMemo(() => {
    const acc = {}; // cat -> key -> {n,u,cat,qty,hasQty,froms:Set}
    chosen.forEach((w) => {
      w.items.forEach((it) => {
        const r = byId[it.rid];
        if (!r) return;
        r.ing.forEach((i) => {
          const key = (i.n + "|" + (i.u || "")).toLowerCase();
          const cat = i.c || "Other";
          acc[cat] = acc[cat] || {};
          const cur = acc[cat][key] || { n: i.n, u: i.u, cat, qty: 0, hasQty: true, count: 0 };
          if (i.q == null) cur.hasQty = false;
          else cur.qty += i.q * (it.mult || 1);
          cur.count += (it.mult || 1);
          acc[cat][key] = cur;
        });
      });
    });
    return acc;
  }, [chosen, byId]);

  const cats = CAT_ORDER.filter((c) => grouped[c] && !(hidePantry && PANTRY_CATS.includes(c)));

  const allItems = [];
  cats.forEach((c) => Object.entries(grouped[c]).forEach(([k, v]) => allItems.push({ c, k, v })));
  const total = allItems.length;
  const done = allItems.filter(({ c, k }) => checked[c + "::" + k]).length;

  function toggle(c, k) {
    const key = c + "::" + k;
    setChecked((p) => ({ ...p, [key]: !p[key] }));
  }
  function clearChecks() { setChecked({}); }

  const [copyOpen, setCopyOpen] = useState(false);
  const [fmt, setFmt] = useState("dash");   // "dash" | "check" | "bare"
  const [flat, setFlat] = useState(false);  // false = grouped by aisle, true = flat A–Z
  const [withQty, setWithQty] = useState(true);
  const [copied, setCopied] = useState(false);
  const taRef = useRef(null);

  function itemLine(v) {
    const prefix = fmt === "check" ? "☐ " : fmt === "dash" ? "- " : "";
    const q = withQty && v.hasQty && v.qty ? qtyText(v.qty) + " " + (v.u || "") + " " : "";
    return prefix + (q + v.n).replace(/\s+/g, " ").trim();
  }

  function buildText() {
    const header = "Grocery List — " + chosen.map((w) => w.name).join(", ");
    if (flat) {
      const all = [];
      cats.forEach((c) => Object.values(grouped[c]).forEach((v) => all.push(v)));
      all.sort((a, b) => a.n.localeCompare(b.n));
      return header + "\n\n" + all.map(itemLine).join("\n") + "\n";
    }
    let out = header + "\n";
    cats.forEach((c) => {
      out += "\n" + c.toUpperCase() + "\n";
      Object.values(grouped[c])
        .sort((a, b) => a.n.localeCompare(b.n))
        .forEach((v) => { out += itemLine(v) + "\n"; });
    });
    return out;
  }

  const copyText = copyOpen ? buildText() : "";

  useEffect(() => {
    if (copyOpen && taRef.current) {
      taRef.current.focus();
      taRef.current.select();
    }
  }, [copyOpen, fmt, flat, withQty]);

  async function copyNow() {
    const text = buildText();
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { ok = false; }
    if (!ok && taRef.current) {
      try {
        taRef.current.focus();
        taRef.current.select();
        ok = document.execCommand("copy");
      } catch (e) { ok = false; }
    }
    if (ok) { setCopied(true); setTimeout(() => setCopied(false), 1800); }
  }

  if (weeks.length === 0) {
    return (
      <div className="fd-empty big">
        <p className="fd-empty-head">Nothing to shop for yet.</p>
        <p>Plan a week of meals and the ingredients gather here, combined and sorted by aisle.</p>
        <button className="fd-btn primary" onClick={goMeals}>Browse meals</button>
      </div>
    );
  }

  return (
    <div className="fd-grocery">
      <div className="fd-shopbar">
        <div className="fd-shopweeks">
          <span className="fd-shoplab">Shopping for:</span>
          {weeks.map((w) => (
            <label key={w.id} className={"fd-wtoggle" + (shopWeeks[w.id] ? " on" : "") + (w.items.length === 0 ? " disabled" : "")}>
              <input
                type="checkbox"
                checked={!!shopWeeks[w.id]}
                disabled={w.items.length === 0}
                onChange={(e) => setShopWeeks((p) => ({ ...p, [w.id]: e.target.checked }))}
              />
              {w.name} <span className="fd-wtoggle-n">{w.items.length}</span>
            </label>
          ))}
        </div>
        <label className="fd-pantry-toggle">
          <input type="checkbox" checked={hidePantry} onChange={(e) => setHidePantry(e.target.checked)} />
          I already have spices &amp; pantry staples
        </label>
      </div>

      {chosen.length === 0 ? (
        <div className="fd-empty">Pick at least one planned week above to build the list.</div>
      ) : total === 0 ? (
        <div className="fd-empty">Those weeks have no meals yet.</div>
      ) : (
        <>
          <div className="fd-progress">
            <div className="fd-progress-track"><div className="fd-progress-fill" style={{ width: (total ? (done / total) * 100 : 0) + "%" }} /></div>
            <span className="fd-progress-lab">{done}/{total} gathered</span>
            <div className="fd-gr-actions">
              <button className="fd-mini strong" onClick={() => setCopyOpen(true)}>Copy list</button>
              <button className="fd-mini" onClick={() => window.print()}>Print</button>
              {done > 0 && <button className="fd-mini" onClick={clearChecks}>Reset checks</button>}
            </div>
          </div>

          <div className="fd-aisles">
            {cats.map((c) => {
              const items = Object.values(grouped[c]).sort((a, b) => a.n.localeCompare(b.n));
              return (
                <section key={c} className="fd-aisle">
                  <h3 className="fd-aisle-head">
                    <span className="fd-aisle-dot" style={{ background: CAT_COLOR[c] }} />
                    {c}
                    <span className="fd-aisle-n">{items.length}</span>
                  </h3>
                  <ul className="fd-aisle-list">
                    {items.map((v) => {
                      const key = c + "::" + (v.n + "|" + (v.u || "")).toLowerCase();
                      const on = !!checked[key];
                      return (
                        <li key={key} className={"fd-item" + (on ? " done" : "")} onClick={() => toggle(c, (v.n + "|" + (v.u || "")).toLowerCase())}>
                          <span className={"fd-check" + (on ? " on" : "")} style={on ? { background: CAT_COLOR[c], borderColor: CAT_COLOR[c] } : null}>{on ? "✓" : ""}</span>
                          <span className="fd-item-q">{v.hasQty && v.qty ? qtyText(v.qty) + " " + (v.u || "") : ""}</span>
                          <span className="fd-item-n">{v.n}</span>
                        </li>
                      );
                    })}
                  </ul>
                </section>
              );
            })}
          </div>
          <p className="fd-note">
            Quantities are summed across every batch you selected. Where the original card gave a range (like 2–3 lb),
            the larger amount is used so you don't come up short. Package sizes stay on the item for reference.
          </p>
        </>
      )}

      {copyOpen && (
        <div className="fd-copy-overlay" onClick={() => setCopyOpen(false)}>
          <div className="fd-copy-panel" onClick={(e) => e.stopPropagation()}>
            <div className="fd-copy-head">
              <h3>Copy your grocery list</h3>
              <button className="fd-copy-x" onClick={() => setCopyOpen(false)} aria-label="Close">✕</button>
            </div>

            <div className="fd-copy-opts">
              <div className="fd-copy-optrow">
                <span className="fd-copy-lab">Style</span>
                <div className="fd-seg">
                  <button className={fmt === "dash" ? "on" : ""} onClick={() => setFmt("dash")}>– bullets</button>
                  <button className={fmt === "check" ? "on" : ""} onClick={() => setFmt("check")}>☐ checkboxes</button>
                  <button className={fmt === "bare" ? "on" : ""} onClick={() => setFmt("bare")}>plain</button>
                </div>
              </div>
              <div className="fd-copy-optrow">
                <span className="fd-copy-lab">Order</span>
                <div className="fd-seg">
                  <button className={!flat ? "on" : ""} onClick={() => setFlat(false)}>By aisle</button>
                  <button className={flat ? "on" : ""} onClick={() => setFlat(true)}>One A–Z list</button>
                </div>
                <label className="fd-copy-check">
                  <input type="checkbox" checked={withQty} onChange={(e) => setWithQty(e.target.checked)} />
                  Amounts
                </label>
              </div>
            </div>

            <textarea
              ref={taRef}
              className="fd-copy-text"
              value={copyText}
              readOnly
              onFocus={(e) => e.target.select()}
              rows={12}
            />

            <div className="fd-copy-foot">
              <span className="fd-copy-hint">Tip: tap the box, then Select All &amp; copy — or use the button.</span>
              <button className="fd-btn primary" onClick={copyNow}>{copied ? "✓ Copied!" : "Copy to clipboard"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            </button>
          ))}
        </div>
        {items.length > 0 && (
          <button className="fd-mini" onClick={() => window.print()}>Print week</button>
        )}
      </div>

      <p className="fd-instr-note">
        🧊 These are cook-from-frozen slow-cooker directions. Thaw each bag overnight in the fridge the night before.
      </p>

      {items.length === 0 ? (
        <div className="fd-empty">This week has no meals yet. Add some from the Meals tab.</div>
      ) : (
        <div className="fd-instr-list">
          {items.map(({ r, mult }, idx) => (
            <article key={r.id + "-" + idx} className="fd-instr-card">
              <div className="fd-card-tab">
                {r.proteins.map((p) => (
                  <span key={p} className="fd-ptag" style={{ background: PROTEIN_COLOR[p] }}>{PROTEIN_LABEL[p]}</span>
                ))}
                {r.cuisine && (
                  <span className="fd-ctag" style={{ color: CUISINE_COLOR[r.cuisine] || "#7C7361", borderColor: (CUISINE_COLOR[r.cuisine] || "#CDC3AB") + "66" }}>{r.cuisine}</span>
                )}
              </div>
              <h3 className="fd-instr-name">
                {r.name}
                {mult > 1 && <span className="fd-instr-mult">make ×{mult}</span>}
              </h3>
              <div className="fd-meta">
                <span>🍽 serves {r.serves}{mult > 1 ? ` (×${mult})` : ""}</span>
                <span>· ⏱ {r.cook || "—"}</span>
                {r.supplies && <span>· 🍳 {cap(r.supplies)}</span>}
              </div>
              {r.steps && r.steps.length ? (
                <ol className="fd-steps">
                  {r.steps.map((s, i) => <li key={i}>{s}</li>)}
                </ol>
              ) : (
                <p className="fd-instr-missing">No directions captured for this recipe — check the original plan.</p>
              )}
            </article>
          ))}
        </div>
      )}
    </div>
  );
}
