/* ---- fraction-friendly quantity display ---- */
function qtyText(n) {
  if (n == null) return "";
  const whole = Math.floor(n + 1e-9);
  const frac = n - whole;
  const map = [
    [0.125, "⅛"], [0.25, "¼"], [1 / 3, "⅓"], [0.375, "⅜"],
    [0.5, "½"], [0.625, "⅝"], [2 / 3, "⅔"], [0.75, "¾"], [0.875, "⅞"],
  ];
  let fstr = "";
  for (const [v, s] of map) if (Math.abs(frac - v) < 0.04) { fstr = s; break; }
  if (fstr) return whole ? `${whole}${fstr}` : fstr;
  const rounded = Math.round(n * 100) / 100;
  return String(rounded % 1 === 0 ? rounded : rounded);
}

/* ---- persistence via artifact storage (falls back to memory) ---- */
const STORE_KEY = "familydinner:v1";
function loadState() {
  try {
    const v = localStorage.getItem(STORE_KEY);
    if (v) return JSON.parse(v);
  } catch (e) { /* first run / unavailable */ }
  return null;
}
function saveState(obj) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch (e) {}
}

const uid = () => Math.random().toString(36).slice(2, 9);

const RATING_META = {
  love: { label: "Love it", mark: "♥", color: "#B0532C" },
  ok: { label: "It's fine", mark: "◐", color: "#C6893B" },
  skip: { label: "Skip", mark: "✕", color: "#8A8375" },
};

function App() {
  const [tab, setTab] = useState("meals");
  const [ratings, setRatings] = useState({});
  const [hidden, setHidden] = useState({});
  const [weeks, setWeeks] = useState([]);
  const [activeWeek, setActiveWeek] = useState(null);
  const [checked, setChecked] = useState({});
  const [shopWeeks, setShopWeeks] = useState({});
  const [hidePantry, setHidePantry] = useState(false);
  const [loaded, setLoaded] = useState(false);

  // load once
  useEffect(() => {
    (async () => {
      const s = await loadState();
      if (s) {
        setRatings(s.ratings || {});
        setHidden(s.hidden || {});
        setWeeks(s.weeks || []);
        setChecked(s.checked || {});
        setShopWeeks(s.shopWeeks || {});
        setHidePantry(!!s.hidePantry);
        setActiveWeek((s.weeks && s.weeks[0] && s.weeks[0].id) || null);
      }
      setLoaded(true);
    })();
  }, []);

  // save on change (after load)
  useEffect(() => {
    if (!loaded) return;
    saveState({ ratings, hidden, weeks, checked, shopWeeks, hidePantry });
  }, [ratings, hidden, weeks, checked, shopWeeks, hidePantry, loaded]);

  const byId = useMemo(() => Object.fromEntries(DATA.map((r) => [r.id, r])), []);

  /* ---------- week helpers ---------- */
  function addWeek(name) {
    const w = { id: uid(), name: name || `Week ${weeks.length + 1}`, items: [] };
    setWeeks((p) => [...p, w]);
    setActiveWeek(w.id);
    setShopWeeks((p) => ({ ...p, [w.id]: true }));
    return w.id;
  }
  function renameWeek(id, name) {
    setWeeks((p) => p.map((w) => (w.id === id ? { ...w, name } : w)));
  }
  function removeWeek(id) {
    setWeeks((p) => p.filter((w) => w.id !== id));
    setShopWeeks((p) => { const n = { ...p }; delete n[id]; return n; });
    if (activeWeek === id) setActiveWeek((weeks.find((w) => w.id !== id) || {}).id || null);
  }
  function addToWeek(weekId, rid) {
    setWeeks((p) =>
      p.map((w) => {
        if (w.id !== weekId) return w;
        if (w.items.some((it) => it.rid === rid)) return w;
        return { ...w, items: [...w.items, { rid, mult: 2 }] };
      })
    );
  }
  function removeFromWeek(weekId, rid) {
    setWeeks((p) => p.map((w) => (w.id === weekId ? { ...w, items: w.items.filter((it) => it.rid !== rid) } : w)));
  }
  function setMult(weekId, rid, mult) {
    setWeeks((p) => p.map((w) => (w.id === weekId ? { ...w, items: w.items.map((it) => (it.rid === rid ? { ...it, mult } : it)) } : w)));
  }

  function rate(rid, val) {
    setRatings((p) => ({ ...p, [rid]: p[rid] === val ? undefined : val }));
  }
  function toggleHide(rid) {
    setHidden((p) => ({ ...p, [rid]: !p[rid] }));
  }

  const weekCount = (rid) => weeks.reduce((n, w) => n + (w.items.some((it) => it.rid === rid) ? 1 : 0), 0);

  return (
    <div className="fd-root">
      <style>{CSS}</style>

      <header className="fd-top">
        <div className="fd-brand">
          <span className="fd-pot" aria-hidden>◗</span>
          <div>
            <div className="fd-word">The Prep Board</div>
            <div className="fd-sub">freezer-to-slow-cooker planning · {DATA.length} meals</div>
          </div>
        </div>
        <nav className="fd-tabs">
          {[
            ["meals", "Meals"],
            ["weeks", "My Weeks"],
            ["cook", "Instructions"],
            ["grocery", "Grocery List"],
          ].map(([k, label]) => (
            <button
              key={k}
              className={"fd-tab" + (tab === k ? " on" : "")}
              onClick={() => setTab(k)}
            >
              {label}
              {k === "weeks" && weeks.length > 0 && <span className="fd-badge">{weeks.length}</span>}
            </button>
          ))}
        </nav>
      </header>

      <main className="fd-main">
        {tab === "meals" && (
          <MealsTab
            data={DATA}
            ratings={ratings}
            hidden={hidden}
            rate={rate}
            toggleHide={toggleHide}
            weeks={weeks}
            addWeek={addWeek}
            addToWeek={addToWeek}
            weekCount={weekCount}
          />
        )}
        {tab === "weeks" && (
          <WeeksTab
            weeks={weeks}
            byId={byId}
            activeWeek={activeWeek}
            setActiveWeek={setActiveWeek}
            addWeek={addWeek}
            renameWeek={renameWeek}
            removeWeek={removeWeek}
            removeFromWeek={removeFromWeek}
            setMult={setMult}
            ratings={ratings}
            goShop={() => setTab("grocery")}
            goMeals={() => setTab("meals")}
          />
        )}
        {tab === "cook" && (
          <InstructionsTab
            weeks={weeks}
            byId={byId}
            activeWeek={activeWeek}
            setActiveWeek={setActiveWeek}
            goMeals={() => setTab("meals")}
          />
        )}
        {tab === "grocery" && (
          <GroceryTab
            weeks={weeks}
            byId={byId}
            shopWeeks={shopWeeks}
            setShopWeeks={setShopWeeks}
            checked={checked}
            setChecked={setChecked}
            hidePantry={hidePantry}
            setHidePantry={setHidePantry}
            goMeals={() => setTab("meals")}
          />
        )}
      </main>
    </div>
  );
}

/* ================= MEALS ================= */
function MealsTab({ data, ratings, hidden, rate, toggleHide, weeks, addWeek, addToWeek, weekCount }) {
  const [q, setQ] = useState("");
  const [protein, setProtein] = useState("all");
  const [cuisine, setCuisine] = useState("all");
  const [quick, setQuick] = useState(false);
  const [sort, setSort] = useState("az");
  const [showHidden, setShowHidden] = useState(false);
  const [menuFor, setMenuFor] = useState(null);

  const proteins = ["all", "chicken", "beef", "pork", "turkey", "vegetarian"];
  const cuisines = useMemo(
    () => ["all", ...Array.from(new Set(data.map((r) => r.cuisine).filter(Boolean))).sort()],
    [data]
  );

  const list = useMemo(() => {
    let out = data.filter((r) => {
      if (!showHidden && hidden[r.id]) return false;
      if (protein !== "all" && !r.proteins.includes(protein)) return false;
      if (cuisine !== "all" && r.cuisine !== cuisine) return false;
      if (quick && !(r.cookHours != null && r.cookHours <= 4)) return false;
      if (q.trim()) {
        const hay = (r.name + " " + (r.cuisine || "") + " " + r.ing.map((i) => i.n).join(" ")).toLowerCase();
        if (!hay.includes(q.trim().toLowerCase())) return false;
      }
      return true;
    });
    const rw = { love: 0, ok: 1, undefined: 2, ok2: 2, skip: 3 };
    out.sort((a, b) => {
      if (sort === "az") return a.name.localeCompare(b.name);
      if (sort === "cook") return (a.cookHours || 99) - (b.cookHours || 99);
      if (sort === "rating") {
        const ra = rw[ratings[a.id]] ?? 2, rb = rw[ratings[b.id]] ?? 2;
        return ra - rb || a.name.localeCompare(b.name);
      }
      return 0;
    });
    return out;
  }, [data, q, protein, cuisine, quick, sort, showHidden, hidden, ratings]);

  const hiddenCount = data.filter((r) => hidden[r.id]).length;

  return (
    <div>
      <div className="fd-toolbar">
        <input
          className="fd-search"
          placeholder="Search meals, ingredients, or cuisine (e.g. Italian, chicken, lime)…"
          value={q}
          onChange={(e) => setQ(e.target.value)}
        />
        <div className="fd-chips">
          {proteins.map((p) => (
            <button
              key={p}
              className={"fd-chip" + (protein === p ? " on" : "")}
              style={protein === p && p !== "all" ? { background: PROTEIN_COLOR[p], borderColor: PROTEIN_COLOR[p], color: "#fff" } : null}
              onClick={() => setProtein(p)}
            >
              {p === "all" ? "All proteins" : PROTEIN_LABEL[p]}
            </button>
          ))}
          <button className={"fd-chip" + (quick ? " on" : "")} onClick={() => setQuick((v) => !v)}>
            ⏱ Quick (≤4h)
          </button>
        </div>
        <div className="fd-toolrow">
          <label className="fd-sortlab">
            Cuisine
            <select className="fd-select" value={cuisine} onChange={(e) => setCuisine(e.target.value)}>
              {cuisines.map((c) => (
                <option key={c} value={c}>{c === "all" ? "All cuisines" : c}</option>
              ))}
            </select>
          </label>
          <label className="fd-sortlab">
            Sort
            <select className="fd-select" value={sort} onChange={(e) => setSort(e.target.value)}>
              <option value="az">A–Z</option>
              <option value="cook">Cook time</option>
              <option value="rating">My rating</option>
            </select>
          </label>
          {hiddenCount > 0 && (
            <button className="fd-link" onClick={() => setShowHidden((v) => !v)}>
              {showHidden ? "Hide skipped" : `Show skipped (${hiddenCount})`}
            </button>
          )}
          <span className="fd-count">{list.length} shown</span>
        </div>
      </div>

      {list.length === 0 ? (
        <div className="fd-empty">No meals match those filters. Loosen a filter to see more.</div>
      ) : (
        <div className="fd-grid">
          {list.map((r) => (
            <MealCard
              key={r.id}
              r={r}
              rating={ratings[r.id]}
              isHidden={!!hidden[r.id]}
              rate={rate}
              toggleHide={toggleHide}
              weeks={weeks}
              addWeek={addWeek}
              addToWeek={addToWeek}
              inWeeks={weekCount(r.id)}
              menuOpen={menuFor === r.id}
              setMenu={(v) => setMenuFor(v ? r.id : null)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function MealCard({ r, rating, isHidden, rate, toggleHide, weeks, addWeek, addToWeek, inWeeks, menuOpen, setMenu }) {
  const [open, setOpen] = useState(false);
  const [newName, setNewName] = useState("");
  return (
    <article className={"fd-card" + (isHidden ? " dim" : "")}>
      <div className="fd-card-tab">
        {r.proteins.map((p) => (
          <span key={p} className="fd-ptag" style={{ background: PROTEIN_COLOR[p] }}>
            {PROTEIN_LABEL[p]}
          </span>
        ))}
        {r.cuisine && (
          <span className="fd-ctag" style={{ color: CUISINE_COLOR[r.cuisine] || "#7C7361", borderColor: (CUISINE_COLOR[r.cuisine] || "#CDC3AB") + "66" }}>
            {r.cuisine}

        <span>· ⏱ {r.cook || "—"}</span>
        <span>· {r.ing.length} ingredients</span>
      </div>

      {open && (() => {
        const resSet = new Set((r.reserve || []).map((x) => x.n));
        const bag = r.ing.filter((i) => !resSet.has(i.n));
        const keepOut = r.ing.filter((i) => resSet.has(i.n));
        const resNote = Object.fromEntries((r.reserve || []).filter((x) => x.note).map((x) => [x.n, x.note]));
        return (
          <div className="fd-recipe">
            <div className="fd-rhead">🛒 Shopping list</div>
            <ul className="fd-inglist">
              {r.ing.map((i, k) => (
                <li key={k}>{i.raw}{resSet.has(i.n) && <span className="fd-restag">reserve — don't bag</span>}</li>
              ))}
              {(r.also || []).map((a, k) => (
                <li key={"a" + k}>{a.toUpperCase()}<span className="fd-restag">cook day — not in bag</span></li>
              ))}
              {r.serveWith && <li>FOR SERVING: {r.serveWith.toUpperCase()}</li>}
            </ul>

            <div className="fd-rhead">🧊 Goes in the freezer bag</div>
            <ul className="fd-inglist">
              {bag.map((i, k) => (
                <li key={k}>{i.raw}</li>
              ))}
            </ul>
            {r.prep && r.prep.length > 0 ? (
              <ol className="fd-steps fd-prep">
                {r.prep.map((s, k) => (
                  <li key={k}>{s}</li>
                ))}
              </ol>
            ) : (
              <p className="fd-rnote">Add these to a gallon freezer bag, label it with the meal name + cook time, and freeze flat.</p>
            )}

            {(keepOut.length > 0 || (r.also || []).length > 0) && (
              <React.Fragment>
                <div className="fd-rhead">✋ Reserve for cook day</div>
                <ul className="fd-inglist">
                  {keepOut.map((i, k) => (
                    <li key={k}>{i.raw}{resNote[i.n] && <span className="fd-restag">{resNote[i.n]}</span>}</li>
                  ))}
                  {(r.also || []).map((a, k) => (
                    <li key={"a" + k}>{a.toUpperCase()}</li>
                  ))}
                </ul>
              </React.Fragment>
            )}

            <div className="fd-rhead">🍲 When it's time to cook</div>
            <ol className="fd-steps">
              {r.steps.map((s, k) => (
                <li key={k}>{s}</li>
              ))}
            </ol>
          </div>
        );
      })()}

      <div className="fd-card-actions">
        <div className="fd-rate">
          {Object.entries(RATING_META).map(([k, m]) => (
            <button
              key={k}
              title={m.label}
              className={"fd-rbtn" + (rating === k ? " on" : "")}
              style={rating === k ? { background: m.color, borderColor: m.color, color: "#fff" } : { color: m.color }}
              onClick={() => rate(r.id, k)}
            >
              <span aria-hidden>{m.mark}</span>
            </button>
          ))}
        </div>
        <button className="fd-mini" onClick={() => setOpen((v) => !v)}>
          {open ? "Hide recipe" : "Recipe"}
        </button>
      </div>

      <div className="fd-card-foot">
        <div className="fd-addwrap">
          <button className="fd-add" onClick={() => setMenu(!menuOpen)}>
            + Add to week {inWeeks > 0 && <span className="fd-inweeks">in {inWeeks}</span>}
          </button>
          {menuOpen && (
            <div className="fd-menu" onMouseLeave={() => setMenu(false)}>
              {weeks.length === 0 && <div className="fd-menu-empty">No weeks yet</div>}
              {weeks.map((w) => {
                const has = w.items.some((it) => it.rid === r.id);
                return (
                  <button
                    key={w.id}
                    className={"fd-menu-item" + (has ? " has" : "")}
                    onClick={() => { addToWeek(w.id, r.id); setMenu(false); }}
                  >
                    {has ? "✓ " : ""}{w.name}
                  </button>
                );
              })}
              <div className="fd-menu-new">
                <input
                  className="fd-menu-input"
                  placeholder="New week…"
                  value={newName}
                  onChange={(e) => setNewName(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") {
                      const id = addWeek(newName.trim() || undefined);
                      addToWeek(id, r.id);
                      setNewName(""); setMenu(false);
                    }
                  }}
                />
                <button
                  className="fd-menu-add"
                  onClick={() => { const id = addWeek(newName.trim() || undefined); addToWeek(id, r.id); setNewName(""); setMenu(false); }}
                >
                  Create
                </button>
              </div>
            </div>
          )}
        </div>
        <button className="fd-hide" onClick={() => toggleHide(r.id)}>
          {isHidden ? "Unhide" : "Hide"}
        </button>
      </div>
    </article>
  );

/* ================= WEEKS ================= */
function WeeksTab({ weeks, byId, activeWeek, setActiveWeek, addWeek, renameWeek, removeWeek, removeFromWeek, setMult, ratings, goShop, goMeals }) {
  const week = weeks.find((w) => w.id === activeWeek) || weeks[0];
  const [editing, setEditing] = useState(false);
  const [nameDraft, setNameDraft] = useState("");

  if (weeks.length === 0) {
    return (
      <div className="fd-empty big">
        <p className="fd-empty-head">No weeks planned yet.</p>
        <p>Build a week, then drop meals into it from the Meals tab. Your grocery list fills in automatically.</p>
        <div className="fd-empty-actions">
          <button className="fd-btn primary" onClick={() => addWeek()}>Start a week</button>
          <button className="fd-btn" onClick={goMeals}>Browse meals</button>
        </div>
      </div>
    );
  }

  const totalCook = week ? week.items.map((it) => byId[it.rid]).filter(Boolean) : [];
  const proteinMix = {};
  totalCook.forEach((r) => r.proteins.forEach((p) => (proteinMix[p] = (proteinMix[p] || 0) + 1)));

  return (
    <div className="fd-weeks">
      <aside className="fd-weeklist">
        {weeks.map((w) => (
          <button
            key={w.id}
            className={"fd-weekitem" + (w.id === (week && week.id) ? " on" : "")}
            onClick={() => setActiveWeek(w.id)}
          >
            <span className="fd-weekname">{w.name}</span>
            <span className="fd-weekmeals">{w.items.length} meals</span>
          </button>
        ))}
        <button className="fd-weekadd" onClick={() => addWeek()}>+ New week</button>
      </aside>

      <section className="fd-weekmain">
        <div className="fd-weekhead">
          {editing ? (
            <input
              autoFocus
              className="fd-weekedit"
              value={nameDraft}
              onChange={(e) => setNameDraft(e.target.value)}
              onBlur={() => { renameWeek(week.id, nameDraft.trim() || week.name); setEditing(false); }}
              onKeyDown={(e) => { if (e.key === "Enter") { renameWeek(week.id, nameDraft.trim() || week.name); setEditing(false); } }}
            />
          ) : (
            <h2 className="fd-weektitle" onClick={() => { setNameDraft(week.name); setEditing(true); }}>
              {week.name} <span className="fd-pencil">✎</span>
            </h2>
          )}
          <div className="fd-weekactions">
            <button className="fd-btn" onClick={goMeals}>+ Add meals</button>
            <button className="fd-btn primary" onClick={goShop} disabled={week.items.length === 0}>
              Grocery list →
            </button>
            <button className="fd-btn danger ghost" onClick={() => removeWeek(week.id)}>Delete</button>
          </div>
        </div>

        {week.items.length > 0 && (
          <div className="fd-weekstats">
            {Object.entries(proteinMix).map(([p, n]) => (
              <span key={p} className="fd-statchip" style={{ borderColor: PROTEIN_COLOR[p], color: PROTEIN_COLOR[p] }}>
                {PROTEIN_LABEL[p]} ×{n}
              </span>
            ))}
          </div>
        )}

        {week.items.length === 0 ? (
          <div className="fd-empty">
            This week is empty. <button className="fd-link" onClick={goMeals}>Add some meals →</button>
          </div>
        ) : (
          <ul className="fd-weekmeal-list">
            {week.items.map((it) => {
              const r = byId[it.rid];
              if (!r) return null;
              return (
                <li key={it.rid} className="fd-weekmeal">
                  <div className="fd-wm-left">
                    <div className="fd-wm-name">
                      {r.name}
                      {ratings[r.id] === "love" && <span className="fd-love"> ♥</span>}
                    </div>
                    <div className="fd-wm-meta">
                      {r.proteins.map((p) => PROTEIN_LABEL[p]).join(", ")} · ⏱ {r.cook} · serves {r.serves}
                    </div>
                  </div>
                  <div className="fd-wm-right">
                    <div className="fd-multi">
                      <span className="fd-multi-lab">batches</span>
                      {[1, 2, 3].map((m) => (
                        <button
                          key={m}
                          className={"fd-multi-btn" + (it.mult === m ? " on" : "")}
                          onClick={() => setMult(week.id, it.rid, m)}
                        >
                          ×{m}
                        </button>
                      ))}
                    </div>
                    <button className="fd-remove" onClick={() => removeFromWeek(week.id, it.rid)} title="Remove">✕</button>
                  </div>
                </li>
              );
            })}
          </ul>
        )}
      </section>
    </div>
  );
}

/* ================= GROCERY ================= */
function GroceryTab({ weeks, byId, shopWeeks, setShopWeeks, checked, setChecked, hidePantry, setHidePantry, goMeals }) {
  const chosen = weeks.filter((w) => shopWeeks[w.id] && w.items.length > 0);

  const grouped = useMemo(() => {
    const acc = {}; // cat -> key -> {n,u,cat,qty,hasQty,froms:Set}
    chosen.forEach((w) => {
      w.items.forEach((it) => {
        const r = byId[it.rid];
        if (!r) return;
        r.ing.forEach((i) => {
          const key = (i.n + "|" + (i.u || "")).toLowerCase();
          const cat = i.c || "Other";
          acc[cat] = acc[cat] || {};
          const cur = acc[cat][key] || { n: i.n, u: i.u, cat, qty: 0, hasQty: true, count: 0 };
          if (i.q == null) cur.hasQty = false;
          else cur.qty += i.q * (it.mult || 1);
          cur.count += (it.mult || 1);
          acc[cat][key] = cur;
        });
      });
    });
    return acc;
  }, [chosen, byId]);

  const cats = CAT_ORDER.filter((c) => grouped[c] && !(hidePantry && PANTRY_CATS.includes(c)));

  const allItems = [];
  cats.forEach((c) => Object.entries(grouped[c]).forEach(([k, v]) => allItems.push({ c, k, v })));
  const total = allItems.length;
  const done = allItems.filter(({ c, k }) => checked[c + "::" + k]).length;

  function toggle(c, k) {
    const key = c + "::" + k;
    setChecked((p) => ({ ...p, [key]: !p[key] }));
  }
  function clearChecks() { setChecked({}); }

  const [copyOpen, setCopyOpen] = useState(false);
  const [fmt, setFmt] = useState("dash");   // "dash" | "check" | "bare"
  const [flat, setFlat] = useState(false);  // false = grouped by aisle, true = flat A–Z
  const [withQty, setWithQty] = useState(true);
  const [copied, setCopied] = useState(false);
  const taRef = useRef(null);

  function itemLine(v) {
    const prefix = fmt === "check" ? "☐ " : fmt === "dash" ? "- " : "";
    const q = withQty && v.hasQty && v.qty ? qtyText(v.qty) + " " + (v.u || "") + " " : "";
    return prefix + (q + v.n).replace(/\s+/g, " ").trim();
  }

  function buildText() {
    const header = "Grocery List — " + chosen.map((w) => w.name).join(", ");
    if (flat) {
      const all = [];
      cats.forEach((c) => Object.values(grouped[c]).forEach((v) => all.push(v)));
      all.sort((a, b) => a.n.localeCompare(b.n));
      return header + "\n\n" + all.map(itemLine).join("\n") + "\n";
    }
    let out = header + "\n";
    cats.forEach((c) => {
      out += "\n" + c.toUpperCase() + "\n";
      Object.values(grouped[c])
        .sort((a, b) => a.n.localeCompare(b.n))
        .forEach((v) => { out += itemLine(v) + "\n"; });
    });
    return out;
  }

  const copyText = copyOpen ? buildText() : "";

  useEffect(() => {
    if (copyOpen && taRef.current) {
      taRef.current.focus();
      taRef.current.select();
    }
  }, [copyOpen, fmt, flat, withQty]);

  async function copyNow() {
    const text = buildText();
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { ok = false; }
    if (!ok && taRef.current) {
      try {
        taRef.current.focus();
        taRef.current.select();
        ok = document.execCommand("copy");
      } catch (e) { ok = false; }
    }
    if (ok) { setCopied(true); setTimeout(() => setCopied(false), 1800); }
  }

  if (weeks.length === 0) {
    return (
      <div className="fd-empty big">
        <p className="fd-empty-head">Nothing to shop for yet.</p>
        <p>Plan a week of meals and the ingredients gather here, combined and sorted by aisle.</p>
        <button className="fd-btn primary" onClick={goMeals}>Browse meals</button>
      </div>
    );
  }

  return (
    <div className="fd-grocery">
      <div className="fd-shopbar">
        <div className="fd-shopweeks">
          <span className="fd-shoplab">Shopping for:</span>
          {weeks.map((w) => (
            <label key={w.id} className={"fd-wtoggle" + (shopWeeks[w.id] ? " on" : "") + (w.items.length === 0 ? " disabled" : "")}>
              <input
                type="checkbox"
                checked={!!shopWeeks[w.id]}
                disabled={w.items.length === 0}
                onChange={(e) => setShopWeeks((p) => ({ ...p, [w.id]: e.target.checked }))}
              />
              {w.name} <span className="fd-wtoggle-n">{w.items.length}</span>
            </label>
          ))}
        </div>
        <label className="fd-pantry-toggle">
          <input type="checkbox" checked={hidePantry} onChange={(e) => setHidePantry(e.target.checked)} />
          I already have spices &amp; pantry staples
        </label>
      </div>

      {chosen.length === 0 ? (
        <div className="fd-empty">Pick at least one planned week above to build the list.</div>
      ) : total === 0 ? (
        <div className="fd-empty">Those weeks have no meals yet.</div>
      ) : (
        <>
          <div className="fd-progress">
            <div className="fd-progress-track"><div className="fd-progress-fill" style={{ width: (total ? (done / total) * 100 : 0) + "%" }} /></div>
            <span className="fd-progress-lab">{done}/{total} gathered</span>
            <div className="fd-gr-actions">
              <button className="fd-mini strong" onClick={() => setCopyOpen(true)}>Copy list</button>
              <button className="fd-mini" onClick={() => window.print()}>Print</button>
              {done > 0 && <button className="fd-mini" onClick={clearChecks}>Reset checks</button>}
            </div>
          </div>

          <div className="fd-aisles">
            {cats.map((c) => {
              const items = Object.values(grouped[c]).sort((a, b) => a.n.localeCompare(b.n));
              return (
                <section key={c} className="fd-aisle">
                  <h3 className="fd-aisle-head">
                    <span className="fd-aisle-dot" style={{ background: CAT_COLOR[c] }} />
                    {c}
                    <span className="fd-aisle-n">{items.length}</span>
                  </h3>
                  <ul className="fd-aisle-list">
                    {items.map((v) => {
                      const key = c + "::" + (v.n + "|" + (v.u || "")).toLowerCase();
                      const on = !!checked[key];
                      return (
                        <li key={key} className={"fd-item" + (on ? " done" : "")} onClick={() => toggle(c, (v.n + "|" + (v.u || "")).toLowerCase())}>
                          <span className={"fd-check" + (on ? " on" : "")} style={on ? { background: CAT_COLOR[c], borderColor: CAT_COLOR[c] } : null}>{on ? "✓" : ""}</span>
                          <span className="fd-item-q">{v.hasQty && v.qty ? qtyText(v.qty) + " " + (v.u || "") : ""}</span>
                          <span className="fd-item-n">{v.n}</span>
                        </li>
                      );
                    })}
                  </ul>
                </section>
              );
            })}
          </div>
          <p className="fd-note">
            Quantities are summed across every batch you selected. Where the original card gave a range (like 2–3 lb),
            the larger amount is used so you don't come up short. Package sizes stay on the item for reference.
          </p>
        </>
      )}

      {copyOpen && (
        <div className="fd-copy-overlay" onClick={() => setCopyOpen(false)}>
          <div className="fd-copy-panel" onClick={(e) => e.stopPropagation()}>
            <div className="fd-copy-head">
              <h3>Copy your grocery list</h3>
              <button className="fd-copy-x" onClick={() => setCopyOpen(false)} aria-label="Close">✕</button>
            </div>

            <div className="fd-copy-opts">
              <div className="fd-copy-optrow">
                <span className="fd-copy-lab">Style</span>
                <div className="fd-seg">
                  <button className={fmt === "dash" ? "on" : ""} onClick={() => setFmt("dash")}>– bullets</button>
                  <button className={fmt === "check" ? "on" : ""} onClick={() => setFmt("check")}>☐ checkboxes</button>
                  <button className={fmt === "bare" ? "on" : ""} onClick={() => setFmt("bare")}>plain</button>
                </div>
              </div>
              <div className="fd-copy-optrow">
                <span className="fd-copy-lab">Order</span>
                <div className="fd-seg">
                  <button className={!flat ? "on" : ""} onClick={() => setFlat(false)}>By aisle</button>
                  <button className={flat ? "on" : ""} onClick={() => setFlat(true)}>One A–Z list</button>
                </div>
                <label className="fd-copy-check">
                  <input type="checkbox" checked={withQty} onChange={(e) => setWithQty(e.target.checked)} />
                  Amounts
                </label>
              </div>
            </div>

            <textarea
              ref={taRef}
              className="fd-copy-text"
              value={copyText}
              readOnly
              onFocus={(e) => e.target.select()}
              rows={12}
            />

            <div className="fd-copy-foot">
              <span className="fd-copy-hint">Tip: tap the box, then Select All &amp; copy — or use the button.</span>
              <button className="fd-btn primary" onClick={copyNow}>{copied ? "✓ Copied!" : "Copy to clipboard"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= INSTRUCTIONS ================= */
function InstructionsTab({ weeks, byId, activeWeek, setActiveWeek, goMeals }) {
  if (weeks.length === 0) {
    return (
      <div className="fd-empty big">
        <p className="fd-empty-head">No weeks planned yet.</p>
        <p>Add meals to a week and the step-by-step cooking directions for each meal will gather here.</p>
        <button className="fd-btn primary" onClick={goMeals}>Browse meals</button>
      </div>
    );
  }
  const week = weeks.find((w) => w.id === activeWeek) || weeks[0];
  const items = week ? week.items.map((it) => ({ ...it, r: byId[it.rid] })).filter((x) => x.r) : [];
  const cap = (s) => (s ? s.charAt(0) + s.slice(1).toLowerCase() : s);

  return (
    <div className="fd-instr">
      <div className="fd-instr-bar">
        <div className="fd-shopweeks">
          <span className="fd-shoplab">Show week:</span>
          {weeks.map((w) => (
            <button
              key={w.id}
              className={"fd-wtoggle" + (week && w.id === week.id ? " on" : "")}
              onClick={() => setActiveWeek(w.id)}
            >
              {w.name} <span className="fd-wtoggle-n">{w.items.length}</span>
            </button>
          ))}
        </div>
        {items.length > 0 && (
          <button className="fd-mini" onClick={() => window.print()}>Print week</button>
        )}
      </div>

      <p className="fd-instr-note">
        🧊 These are cook-from-frozen slow-cooker directions. Thaw each bag overnight in the fridge the night before.
      </p>

      {items.length === 0 ? (
        <div className="fd-empty">This week has no meals yet. Add some from the Meals tab.</div>
      ) : (
        <div className="fd-instr-list">
          {items.map(({ r, mult }, idx) => (
            <article key={r.id + "-" + idx} className="fd-instr-card">
              <div className="fd-card-tab">
                {r.proteins.map((p) => (
                  <span key={p} className="fd-ptag" style={{ background: PROTEIN_COLOR[p] }}>{PROTEIN_LABEL[p]}</span>
                ))}
                {r.cuisine && (
                  <span className="fd-ctag" style={{ color: CUISINE_COLOR[r.cuisine] || "#7C7361", borderColor: (CUISINE_COLOR[r.cuisine] || "#CDC3AB") + "66" }}>{r.cuisine}</span>
                )}
              </div>
              <h3 className="fd-instr-name">
                {r.name}
                {mult > 1 && <span className="fd-instr-mult">make ×{mult}</span>}
              </h3>
              <div className="fd-meta">
                <span>🍽 serves {r.serves}{mult > 1 ? ` (×${mult})` : ""}</span>
                <span>· ⏱ {r.cook || "—"}</span>
                {r.supplies && <span>· 🍳 {cap(r.supplies)}</span>}
              </div>
              {r.steps && r.steps.length ? (
                <ol className="fd-steps">
                  {r.steps.map((s, i) => <li key={i}>{s}</li>)}
                </ol>
              ) : (
                <p className="fd-instr-missing">No directions captured for this recipe — check the original plan.</p>
              )}
            </article>
          ))}
        </div>
      )}
    </div>
  );
}

.fd-shopbar{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}
.fd-shopweeks{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fd-shoplab{font-size:13px;color:var(--muted);font-weight:600}
.fd-wtoggle{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:6px 12px;font-size:13px}
.fd-wtoggle.on{border-color:var(--green);background:#EEF3F0;color:var(--green-deep);font-weight:600}
.fd-wtoggle.disabled{opacity:.45}
.fd-wtoggle-n{background:#eee6d5;border-radius:9px;padding:0 6px;font-size:11px;color:var(--muted)}
.fd-pantry-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
.fd-progress{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.fd-progress-track{flex:1;min-width:160px;height:9px;background:#d9d0bd;border-radius:6px;overflow:hidden}
.fd-progress-fill{height:100%;background:var(--green);transition:width .25s}
.fd-progress-lab{font-size:13px;color:var(--muted);font-weight:600}
.fd-gr-actions{display:flex;gap:7px}
.fd-aisles{columns:2;column-gap:18px}
.fd-aisle{break-inside:avoid;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:16px;display:inline-block;width:100%}
.fd-aisle-head{display:flex;align-items:center;gap:9px;font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;margin:0 0 10px}
.fd-aisle-dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.fd-aisle-n{margin-left:auto;font-family:'Inter';font-size:12px;color:var(--muted);font-weight:500;background:#fff;border:1px solid var(--line);border-radius:9px;padding:1px 8px}
.fd-aisle-list{list-style:none;margin:0;padding:0}
.fd-item{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid #efe8d7;cursor:pointer;font-size:14px}
.fd-item:last-child{border-bottom:none}
.fd-item.done{opacity:.5}
.fd-item.done .fd-item-n{text-decoration:line-through}
.fd-check{width:20px;height:20px;border:1.5px solid var(--line);border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;background:#fff}
.fd-item-q{font-weight:600;color:var(--green-deep);min-width:52px;font-variant-numeric:tabular-nums}
.fd-item-n{color:var(--ink)}
.fd-note{font-size:12.5px;color:var(--muted);max-width:640px;margin:6px 2px;line-height:1.5}

/* empties */
.fd-empty{background:var(--paper);border:1px dashed var(--line);border-radius:13px;padding:22px;color:var(--muted);font-size:14.5px;text-align:center}
.fd-empty.big{padding:48px 24px}
.fd-empty-head{font-family:'Fraunces',Georgia,serif;font-size:22px;color:var(--ink);margin:0 0 8px}
.fd-empty-actions{display:flex;gap:10px;justify-content:center;margin-top:18px}

@media(max-width:820px){
 .fd-weeks{grid-template-columns:1fr}
 .fd-weeklist{position:static;flex-direction:row;overflow:auto;flex-wrap:nowrap}
 .fd-weekitem{min-width:130px}
 .fd-aisles{columns:1}
}
@media(max-width:520px){
 .fd-top{flex-direction:column;align-items:stretch;gap:10px}
 .fd-tabs{justify-content:space-between;flex-wrap:wrap}
 .fd-grid{grid-template-columns:1fr}
}
@media print{
 .fd-top,.fd-shopbar,.fd-progress,.fd-toolbar,.fd-note{display:none}
 .fd-aisles{columns:2}
 .fd-root{background:#fff}
}

/* copy panel */
.fd-mini.strong{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.fd-copy-overlay{position:fixed;inset:0;background:rgba(33,58,51,.42);display:flex;align-items:center;justify-content:center;padding:18px;z-index:100}
.fd-copy-panel{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.28);width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}
.fd-copy-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.fd-copy-head h3{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;margin:0}
.fd-copy-x{border:none;background:none;font-size:16px;color:var(--muted);padding:4px 8px;border-radius:7px}
.fd-copy-x:hover{background:#0000000d}
.fd-copy-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.fd-copy-optrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fd-copy-lab{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;min-width:44px}
.fd-seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.fd-seg button{border:none;background:#fff;color:var(--muted);padding:7px 11px;font-size:12.5px;font-weight:500;border-right:1px solid var(--line)}
.fd-seg button:last-child{border-right:none}
.fd-seg button.on{background:var(--green);color:#fff}
.fd-copy-check{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink)}
.fd-copy-text{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.5;color:var(--ink);resize:vertical;white-space:pre;overflow:auto}
.fd-copy-text:focus{outline:none;border-color:var(--green)}
.fd-copy-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;flex-wrap:wrap}
.fd-copy-hint{font-size:12px;color:var(--muted);flex:1;min-width:180px}
@media(max-width:520px){
 .fd-copy-foot .fd-btn{width:100%}
}

/* instructions tab */
.fd-instr-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px}
.fd-instr-bar .fd-shopweeks{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.fd-instr-bar .fd-mini{margin-left:auto}
.fd-instr-note{font-size:13px;color:var(--green-deep);background:#EAF0EA;border:1px solid #CFDDCF;border-radius:10px;padding:10px 13px;margin:0 0 18px}
.fd-instr-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.fd-instr-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.fd-instr-name{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;line-height:1.2;margin:4px 0 6px;display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.fd-instr-mult{font-family:'Inter';font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#3a2a10;background:var(--honey);border-radius:8px;padding:2px 8px}
.fd-steps{margin:12px 0 0;padding:0 0 0 4px;list-style:none;counter-reset:step}
.fd-steps li{position:relative;padding:0 0 12px 38px;font-size:14px;line-height:1.5;color:#3f3b30;counter-increment:step}
.fd-steps li:before{content:counter(step);position:absolute;left:0;top:-1px;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-family:'Inter';font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
.fd-steps li:not(:last-child):after{content:"";position:absolute;left:12.5px;top:26px;bottom:2px;width:1.5px;background:var(--line)}
.fd-instr-missing{font-size:13px;color:var(--muted);font-style:italic;margin:10px 0 0}
@media(max-width:520px){
 .fd-instr-list{grid-template-columns:1fr}
}
@media print{
 .fd-instr-bar,.fd-instr-note{display:none}
 .fd-instr-list{display:block}
 .fd-instr-card{break-inside:avoid;box-shadow:none;margin-bottom:14px}
}
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
